server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:8000;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
